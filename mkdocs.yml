site_name: ait — Git workflow layer for AI coding agents
site_url: https://m24927605.github.io/ait/
site_description: >-
  ait is a Git-native version control layer for AI coding agents
  (Claude Code, Codex CLI, Aider, Gemini CLI, Cursor) — adding
  worktree isolation, attempt provenance, cross-agent memory, and
  reviewable promotion on top of Git. Open source (MIT), Python
  3.14+, dependency-free, no SaaS, no telemetry.
site_author: sin-chengchen
repo_url: https://github.com/m24927605/ait
repo_name: m24927605/ait
edit_uri: edit/main/site-docs/
copyright: MIT licensed.

docs_dir: site-docs

theme:
  name: material
  custom_dir: overrides
  features:
    - navigation.tracking
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.action.edit
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - i18n:
      docs_structure: folder
      fallback_to_default: true
      reconfigure_material: true
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: zh-TW
          name: 繁體中文
          build: true
          site_name: ait — AI coding agent 的 Git 工作層
          nav_translations:
            Home: 首頁
            Why ait: 為什麼用 ait
            Getting started: 開始使用
            Integrations: 整合
            Claude Code: Claude Code
            Codex CLI: Codex CLI
            Aider: Aider
            Gemini CLI: Gemini CLI
            Cursor: Cursor
            Shell agents: Shell agents
            Compare: 比較
            "ait vs naked git-worktree": ait 對比裸 git-worktree
            Facts: 事實
            Reference: 參考
            Commands: 指令

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.snippets

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/m24927605/ait
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/ait-vcs/
    - icon: fontawesome/brands/npm
      link: https://www.npmjs.com/package/ait-vcs

nav:
  - Home: index.md
  - Why ait: why-ait.md
  - Getting started: getting-started.md
  - Integrations:
      - Claude Code: integrations/claude-code.md
      - Codex CLI: integrations/codex.md
      - Aider: integrations/aider.md
      - Gemini CLI: integrations/gemini.md
      - Cursor: integrations/cursor.md
      - Shell agents: integrations/shell.md
  - Compare:
      - "ait vs naked git-worktree": compare/git-worktree-naked-vs-ait.md
  - Reference:
      - Commands: reference/commands.md
  - Facts: facts.md
